version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: sqlserver-2019
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=123456789
      - MSSQL_PID=Standard
    ports:
      - "1433:1433"
    volumes:
      - E:/docker-hub/MSSQL2019/Data:/var/opt/mssql